<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoScope — Pairs Trading Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/static/js/main.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <span class="logo-icon">C</span>
            <span class="logo-text">CryptoScope</span>
            <span class="logo-subtitle">pairs trading terminal</span>
        </div>
        <div class="navbar-tabs" id="nav-tabs">
            <a href="/" class="nav-tab active" data-tab="signals">
                <span class="tab-icon">🚦</span> Сигналы
            </a>
            <a href="#" class="nav-tab" data-tab="portfolio" hx-get="/tab/portfolio" hx-trigger="click" hx-target="#main-content" hx-swap="innerHTML">
                <span class="tab-icon">📊</span> Портфель
            </a>
            <a href="#" class="nav-tab" data-tab="scanners" hx-get="/tab/scanners" hx-trigger="click" hx-target="#main-content" hx-swap="innerHTML">
                <span class="tab-icon">🔍</span> Сканеры
            </a>
            <a href="#" class="nav-tab" data-tab="favorites" hx-get="/tab/favorites" hx-trigger="click" hx-target="#main-content" hx-swap="innerHTML">
                <span class="tab-icon">⭐</span> Избранное
            </a>
            <a href="#" class="nav-tab" data-tab="data" hx-get="/tab/data" hx-trigger="click" hx-target="#main-content" hx-swap="innerHTML">
                <span class="tab-icon">📂</span> Данные
            </a>
            <a href="#" class="nav-tab" data-tab="ai" hx-get="/tab/ai" hx-trigger="click" hx-target="#main-content" hx-swap="innerHTML">
                <span class="tab-icon">🤖</span> AI-аналитик
            </a>
        </div>
        <div class="navbar-end">
            <div class="live-status" id="live-status">
                <span class="status-dot offline" id="ws-dot"></span>
                <span class="live-text" id="ws-text">Offline</span>
            </div>
            <div id="auth-status">
                {% include "components/auth_status.html" %}
            </div>
        </div>
    </nav>

    <main class="main-content" id="main-content">
        {% block content %}{% endblock %}
        {% block signals_content %}{% endblock %}
    </main>

    <div id="toast-container"></div>

    {% include "components/onboarding_modal.html" %}

    <script>
        // Tab switching
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Heartbeat ping
        setInterval(() => {
            fetch('/health').catch(() => {});
        }, 60000);

        // Wake Lock
        if ('wakeLock' in navigator) {
            try {
                navigator.wakeLock.request('screen');
            } catch(e) {}
        }

// Check Binance WS status
async function updateLiveStatus() {
    try {
        const r = await fetch('/api/favorites/live-status');
        const d = await r.json();
        const dot = document.getElementById('ws-dot');
        const txt = document.getElementById('ws-text');
        if (d.connected) {
            dot.className = 'status-dot live';
            txt.textContent = 'Live';
        } else {
            dot.className = 'status-dot offline';
            txt.textContent = 'Offline';
        }
    } catch(e) {}
}
updateLiveStatus();
setInterval(updateLiveStatus, 10000);
    </script>
</body>
</html>
