<div class="signal-filters">
    <label class="filter-check">
        <input type="checkbox" id="filter-coint"
               hx-get="/tab/signals?mode=all"
               hx-target="#signals-content" hx-swap="innerHTML"
               hx-include="#filter-corr,#filter-days">
        Только коинтеграция
    </label>
    <label class="filter-slider">
        Мин. корреляция: <span id="corr-value">0.5</span>
        <input type="range" id="filter-corr" min="0" max="1" step="0.05" value="0.5"
               hx-get="/tab/signals?mode=all"
               hx-target="#signals-content" hx-swap="innerHTML"
               hx-include="#filter-coint,#filter-days">
    </label>
    <label class="filter-slider">
        Макс. дней: <span id="days-value">30</span>
        <input type="range" id="filter-days" min="3" max="60" step="1" value="30"
               hx-get="/tab/signals?mode=all"
               hx-target="#signals-content" hx-swap="innerHTML"
               hx-include="#filter-coint,#filter-corr">
    </label>
</div>
