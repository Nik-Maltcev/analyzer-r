<div class="tab-page ai-page">
    <div class="page-header">
        <h2>🤖 AI-аналитик</h2>
        <p class="page-desc">DeepSeek v4 Pro — анализ рынка и рекомендации</p>
    </div>

    <div class="ai-controls">
        <button class="btn btn-primary btn-lg" 
                hx-post="/api/ai/analyze"
                hx-vals='js:{market: currentMarket}'
                hx-target="#ai-result" 
                hx-swap="innerHTML"
                hx-indicator="#ai-loading">
            Спросить AI
        </button>
        <div id="ai-loading" class="htmx-indicator loading-container">
            <div class="loading-spinner"></div>
            <p>AI анализирует данные...</p>
        </div>
    </div>

    <div id="ai-result" class="ai-result">
        <div class="empty-state">
            <span class="empty-icon">🤖</span>
            <p>Нажмите "Спросить AI" для получения анализа рынка</p>
        </div>
    </div>
</div>
