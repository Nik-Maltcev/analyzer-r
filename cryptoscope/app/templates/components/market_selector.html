<div class="market-selector-bar">
    <span class="market-label">Рынок:</span>
    {% for market_id in enabled_markets %}
    <button class="market-btn {% if market == market_id %}active{% endif %}"
            data-market="{{ market_id }}"
            onclick="switchMarket('{{ market_id }}')">
        {{ market_names[market_id] }}
    </button>
    {% endfor %}
</div>
