version: '3.8'

services:
  cryptoscope:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_PATH=/data/market.db
      - PORT=3000
      - TWELVEDATA_API_KEY=${TWELVEDATA_API_KEY:-}
      - BRAZIL_HISTORY_YEARS=${BRAZIL_HISTORY_YEARS:-3}
      - INDONESIA_HISTORY_YEARS=${INDONESIA_HISTORY_YEARS:-3}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-CryptoScope <onboarding@resend.dev>}
      - APP_BASE_URL=${APP_BASE_URL:-}
      - AUTH_LEGACY_OWNER_EMAIL=${AUTH_LEGACY_OWNER_EMAIL:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - cryptoscope_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cryptoscope_data:
